<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team — Boulderverein Zugzwang e.V.</title>
<meta name="description" content="Das Team des Boulderverein Zugzwang e.V. — Vorstand, Jugendtraining und Routenbau.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #141414;
    --dark: #1c1c1c;
    --dark-card: #232323;
    --dark-border: #333;
    --yellow: #D4A020;
    --yellow-light: #E8B930;
    --cream: #E8DCC8;
    --cream-dim: #c4b9a6;
    --white: #f0ece4;
    --text: #d4d0c8;
    --text-dim: #8a8680;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--black); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== NAV ===== */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(20,20,20,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--dark-border);
  }
  .nav-top {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px 4px;
  }
  .nav-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 22px;
    letter-spacing: 1px; text-transform: uppercase; text-decoration: none;
  }
  .nav-logo .zug { color: var(--cream); }
  .nav-logo .zwang { color: var(--yellow); }
  .nav-login {
    color: var(--cream-dim); text-decoration: none;
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; font-weight: 500; transition: color 0.2s;
  }
  .nav-login:hover { color: var(--yellow); }
  .nav-login svg { width: 20px; height: 20px; fill: currentColor; }
  .nav-links {
    display: flex; gap: 0px 2px; align-items: center; justify-content: center;
    flex-wrap: wrap; padding: 0 24px 6px;
    max-width: 1200px; margin: 0 auto;
  }
  .nav-links a {
    color: var(--cream-dim); text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 6px; transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-links a:hover { color: var(--cream); background: rgba(255,255,255,0.06); }
  .nav-links a.active { color: var(--yellow); background: rgba(212,160,32,0.1); }

  /* ===== PAGE HEADER ===== */
  .page-header {
    margin-top: 64px; padding: 48px 24px 0;
    max-width: 1200px; margin-left: auto; margin-right: auto;
  }
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--yellow); margin-bottom: 8px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px; font-weight: 700;
    color: var(--cream); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 32px;
  }

  /* ===== SECTIONS ===== */
  section { max-width: 1200px; margin: 0 auto; padding: 48px 24px; }

  /* ===== TEAM GRID ===== */
  .vorstand-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px;
  }
  .vorstand-card {
    background: var(--dark-card); border: 1px solid var(--dark-border);
    border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px;
  }
  .vorstand-icon {
    width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
    background: rgba(212,160,32,0.1); border: 2px solid rgba(212,160,32,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: var(--yellow-light); overflow: hidden;
  }
  .vorstand-icon img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .vorstand-info { min-width: 0; }
  .vorstand-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--cream); text-transform: uppercase;
  }
  .vorstand-role { font-size: 14px; color: var(--yellow-light); font-weight: 600; }

  /* ===== FOOTER ===== */
  footer {
    border-top: 1px solid var(--dark-border);
    padding: 40px 24px; text-align: center; max-width: 1200px; margin: 0 auto;
  }
  .footer-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 20px; text-transform: uppercase; margin-bottom: 12px;
  }
  .footer-logo .zug { color: var(--cream); }
  .footer-logo .zwang { color: var(--yellow); }
  .footer-links { display: flex; gap: 24px; justify-content: center; margin: 16px 0; }
  .footer-links a { color: var(--text-dim); text-decoration: none; font-size: 13px; transition: color 0.2s; }
  .footer-links a:hover { color: var(--cream); }
  .footer-copy { color: var(--text-dim); font-size: 12px; margin-top: 16px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .nav-links a { font-size: 11px; padding: 5px 8px; }
    .vorstand-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-top">
    <a href="index.html" class="nav-logo"><span class="zug">Zug</span><span class="zwang">zwang</span></a>
    <a href="intern.html" class="nav-login" title="Intern"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></a>
  </div>
  <div class="nav-links">
    <a href="index.html">Boulderhalle</a>
    <a href="verein.html">Verein</a>
    <a href="team.html" class="active">Team</a>
    <a href="jugendtraining.html">Jugendtraining</a>
    <a href="info.html">Info</a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header" id="pageHeader" style="margin-top:80px;">
  <span class="section-label">Team</span>
  <h2 class="section-title">Unser Team</h2>
</div>

<!-- TEAM -->
<section>
  <div id="teamContent">
    <div style="text-align:center;padding:40px;color:var(--yellow-light);opacity:0.6;">Team wird geladen...</div>
  </div>
</section>
<script>
(function() {
  fetch('https://api.github.com/repos/boulderhallezugzwang/zugzwang-website/contents/data/team.json?ref=main', {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  })
    .then(function(r) { return r.json(); })
    .then(function(file) {
      return JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g, '')))));
    })
    .then(function(team) {
      var groups = {};
      var order = [];
      team.forEach(function(m) {
        var b = m.bereich || 'Sonstige';
        if (!groups[b]) { groups[b] = []; order.push(b); }
        groups[b].push(m);
      });
      var html = '';
      order.forEach(function(g) {
        groups[g].sort(function(a, b) { return (a.reihenfolge || 99) - (b.reihenfolge || 99); });
        // Bei Jugendtraining nur den ersten Eintrag zeigen
        var members = g === 'Jugendtraining' ? [groups[g][0]] : groups[g];
        html += '<h2 class="section-title" style="margin-top:40px;">' + g + '</h2>';
        html += '<div class="vorstand-grid" style="margin-bottom:20px;">';
        members.forEach(function(m) {
          var initials = m.name.split(' ').map(function(w) { return w[0]; }).join('');
          html += '<div class="vorstand-card">';
          html += '<div class="vorstand-icon">';
          if (m.bild) {
            html += '<img src="' + m.bild + '" alt="' + m.name + '" loading="lazy" onerror="this.parentElement.textContent=\'' + initials + '\'">';
          } else {
            html += initials;
          }
          html += '</div>';
          html += '<div class="vorstand-info"><div class="vorstand-name">' + m.name + '</div><div class="vorstand-role">' + (m.rolle || '') + '</div></div>';
          html += '</div>';
        });
        html += '</div>';
      });
      document.getElementById('teamContent').innerHTML = html;
    });
})();
// Dynamischer margin-top für page-header
setTimeout(function() {
  var nav = document.querySelector('nav');
  if (nav) document.getElementById('pageHeader').style.marginTop = nav.offsetHeight + 'px';
}, 50);
</script>

</footer>

</body>
