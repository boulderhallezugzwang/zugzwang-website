<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intern — Boulderverein Zugzwang e.V.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #141414;
    --dark: #1c1c1c;
    --dark-card: #232323;
    --dark-border: #333;
    --yellow: #D4A020;
    --yellow-light: #E8B930;
    --cream: #E8DCC8;
    --cream-dim: #c4b9a6;
    --white: #f0ece4;
    --text: #d4d0c8;
    --text-dim: #8a8680;
    --error: #e74c3c;
    --success: #2ecc71;
    --radius: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; line-height: 1.5;
    color: var(--text); background: var(--black);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }

  /* ===== NAV ===== */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(20,20,20,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--dark-border);
  }
  .nav-top {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    padding: 10px 24px 4px;
  }
  .nav-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 22px;
    letter-spacing: 1px; text-transform: uppercase; text-decoration: none;
  }
  .nav-logo .zug { color: var(--cream); }
  .nav-logo .zwang { color: var(--yellow); }
  .nav-links {
    display: flex; gap: 2px; align-items: center; justify-content: center;
    flex-wrap: wrap; padding: 0 24px 8px;
    max-width: 1200px; margin: 0 auto;
  }
  .nav-links a {
    color: var(--cream-dim); text-decoration: none;
    font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 6px; transition: all 0.2s;
    white-space: nowrap;
  }
  .nav-links a:hover { color: var(--cream); background: rgba(255,255,255,0.06); }
  .nav-links a.active { color: var(--yellow); background: rgba(212,160,32,0.1); }

  /* ===== LOGIN ===== */
  .login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .login-box {
    background: var(--dark-card); border: 1px solid var(--dark-border);
    border-radius: 16px; padding: 48px 40px;
    max-width: 380px; width: 100%; text-align: center;
  }
  .login-box h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 800; color: var(--yellow);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .login-box .subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 28px; }
  .login-box .welcome-msg {
    font-size: 15px; color: var(--cream); margin-bottom: 20px;
  }
  .login-box input {
    width: 100%; padding: 12px 16px; font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--dark-border); border-radius: var(--radius);
    background: var(--dark); color: var(--cream);
    outline: none; text-align: center; letter-spacing: 1px;
    transition: border-color 0.2s; margin-bottom: 8px;
  }
  .login-box input:focus { border-color: var(--yellow); }
  .login-box input.error {
    border-color: var(--error); animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .login-box button {
    width: 100%; margin-top: 6px; padding: 12px;
    font-size: 15px; font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--black); background: var(--yellow);
    border: none; border-radius: var(--radius);
    cursor: pointer; transition: background 0.2s;
  }
  .login-box button:hover { background: var(--yellow-light); }
  .login-box button:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-err { color: var(--error); font-size: 13px; margin-top: 10px; display: none; }
  .login-hint { font-size: 12px; color: var(--text-dim); margin-top: 8px; }
  .login-back {
    background: none; border: none; color: var(--text-dim); font-size: 13px;
    cursor: pointer; margin-top: 16px; font-family: 'DM Sans', sans-serif;
    text-decoration: underline;
  }
  .login-back:hover { color: var(--cream); }

  .login-step { display: none; }
  .login-step.active { display: block; }

  /* ===== APP ===== */
  .app { display: none; padding-top: 64px; }
  .app-header {
    background: var(--dark-card); border-bottom: 1px solid var(--dark-border);
    padding: 0; position: sticky; top: 64px; z-index: 50;
  }
  .app-header-inner {
    max-width: 720px; margin: 0 auto; padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .app-tabs {
    display: flex; gap: 2px;
  }
  .app-tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700; color: var(--text-dim);
    text-transform: uppercase; background: none; border: none;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
  }
  .app-tab.active { color: var(--yellow); background: rgba(212,160,32,0.1); }
  .app-tab:hover { color: var(--cream); }
  .app-user-info {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: var(--text-dim);
  }
  .app-user-name { white-space: nowrap; }
  .logout-btn {
    background: none; border: 1px solid var(--dark-border);
    color: var(--text-dim); font-size: 13px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; padding: 4px 12px; border-radius: 6px; transition: all 0.15s;
  }
  .logout-btn:hover { border-color: var(--error); color: var(--error); }

  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    max-width: 720px; margin: 0 auto; padding: 16px 24px 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .app-count {
    font-size: 12px; font-weight: 600; color: var(--yellow-light);
    background: rgba(212,160,32,0.12); padding: 3px 10px;
    border-radius: 20px; white-space: nowrap;
  }

  .search-bar { max-width: 720px; margin: 12px auto 0; padding: 0 24px; }
  .search-bar input {
    width: 100%; padding: 12px 16px; font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    border: 1px solid var(--dark-border); border-radius: var(--radius);
    background: var(--dark-card); color: var(--cream); outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input::placeholder { color: var(--text-dim); }
  .search-bar input:focus { border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(212,160,32,0.12); }

  .list-container { max-width: 720px; margin: 16px auto; padding: 0 24px 40px; }

  .member-card {
    background: var(--dark-card); border: 1px solid var(--dark-border);
    border-radius: var(--radius); padding: 14px 18px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 14px; transition: border-color 0.15s;
  }
  .member-card:hover { border-color: rgba(255,255,255,0.12); }
  .member-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(212,160,32,0.1); color: var(--yellow);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; flex-shrink: 0;
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name {
    font-weight: 600; font-size: 15px; color: var(--cream);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .member-name .highlight { background: rgba(212,160,32,0.3); border-radius: 2px; padding: 0 1px; }
  .member-meta {
    font-size: 13px; color: var(--text-dim);
    display: flex; gap: 14px; flex-wrap: wrap; margin-top: 2px;
  }
  .member-meta a { color: var(--yellow); text-decoration: none; }
  .member-meta a:hover { text-decoration: underline; }
  .member-status {
    font-size: 11px; font-weight: 600; color: var(--yellow-light);
    background: rgba(212,160,32,0.12); padding: 2px 8px;
    border-radius: 12px; white-space: nowrap; flex-shrink: 0;
  }
  .member-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .chip-badge {
    font-size: 11px; font-weight: 500; padding: 2px 8px;
    border-radius: 12px; white-space: nowrap; cursor: pointer; transition: background 0.15s;
  }
  .chip-badge.has-chip { background: rgba(46,204,113,0.15); color: #58d68d; }
  .chip-badge.no-chip { background: rgba(231,76,60,0.15); color: #e74c3c; }
  .chip-badge:hover { filter: brightness(1.2); }
  .chip-edit { display: flex; align-items: center; gap: 6px; }
  .chip-edit input {
    width: 80px; padding: 4px 8px; font-size: 12px; font-family: inherit;
    border: 1px solid var(--dark-border); border-radius: 6px;
    background: var(--dark); color: var(--cream); outline: none;
  }
  .chip-edit input:focus { border-color: var(--yellow); }
  .chip-edit select {
    padding: 4px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--dark-border); background: var(--dark); color: var(--cream);
  }
  .chip-edit button {
    padding: 3px 10px; font-size: 11px; font-family: inherit;
    border: none; border-radius: 6px; cursor: pointer;
  }
  .chip-edit .save-btn { background: var(--yellow); color: var(--black); font-weight: 600; }
  .chip-edit .cancel-btn { background: var(--dark-border); color: var(--text); }

  .no-results { text-align: center; padding: 48px 20px; color: var(--text-dim); }
  .no-results .nr-icon { font-size: 36px; margin-bottom: 8px; }
  .loading { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--dark-border); border-top-color: var(--yellow);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .nav-links a { font-size: 11px; padding: 5px 8px; }
  }
  @media (max-width: 520px) {
    .app-header-inner { padding: 10px 16px; flex-wrap: wrap; }
    .search-bar, .list-container { padding-left: 16px; padding-right: 16px; }
    .section-header { padding-left: 16px; padding-right: 16px; }
    .member-card { padding: 12px 14px; }
    .member-meta { flex-direction: column; gap: 2px; }
    .login-box { padding: 36px 28px; }
  }

  /* ===== FOOTER ===== */
  footer {
    border-top: 1px solid var(--dark-border);
    padding: 40px 24px; text-align: center; max-width: 1200px; margin: 0 auto;
  }
  .footer-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 20px; text-transform: uppercase; margin-bottom: 12px;
  }
  .footer-logo .zug { color: var(--cream); }
  .footer-logo .zwang { color: var(--yellow); }
  .footer-links { display: flex; gap: 24px; justify-content: center; margin: 16px 0; }
  .footer-links a { color: var(--text-dim); text-decoration: none; font-size: 13px; transition: color 0.2s; }
  .footer-links a:hover { color: var(--cream); }
  .footer-copy { color: var(--text-dim); font-size: 12px; margin-top: 16px; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-top">
    <a href="index.html" class="nav-logo"><span class="zug">Zug</span><span class="zwang">zwang</span></a>
  </div>
  <div class="nav-links">
    <a href="index.html">Boulderhalle</a>
    <a href="verein.html">Verein</a>
    <a href="jugendtraining.html">Jugendtraining</a>
    <a href="info.html">Info</a>
    <a href="intern.html" class="active">Intern</a>
  </div>
</nav>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Interner Bereich</h1>
    <div class="subtitle">Boulderverein Zugzwang e.V.</div>

    <!-- Schritt 1: Benutzername -->
    <div class="login-step active" id="stepUsername">
      <input type="text" id="usernameInput" placeholder="Benutzername" autocomplete="username">
      <button onclick="checkUsername()">Weiter</button>
      <div class="login-err" id="usernameErr"></div>
    </div>

    <!-- Schritt 2a: Passwort festlegen (Erstanmeldung) -->
    <div class="login-step" id="stepSetPassword">
      <div class="welcome-msg" id="welcomeMsg"></div>
      <input type="password" id="newPw1" placeholder="Neues Passwort" autocomplete="new-password">
      <input type="password" id="newPw2" placeholder="Passwort wiederholen" autocomplete="new-password">
      <button onclick="setPassword()">Passwort festlegen</button>
      <div class="login-hint">Mindestens 6 Zeichen</div>
      <div class="login-err" id="setPwErr"></div>
      <button class="login-back" onclick="backToUsername()">Anderer Benutzername</button>
    </div>

    <!-- Schritt 2b: Anmelden -->
    <div class="login-step" id="stepLogin">
      <div class="welcome-msg" id="loginGreeting"></div>
      <input type="password" id="loginPw" placeholder="Passwort" autocomplete="current-password">
      <button onclick="doLogin()">Anmelden</button>
      <div class="login-err" id="loginErr"></div>
      <button class="login-back" onclick="backToUsername()">Anderer Benutzername</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="app-header">
    <div class="app-header-inner">
      <div class="app-tabs">
        <button class="app-tab active" data-section="members">Mitgliederliste</button>
      </div>
      <div class="app-user-info">
        <span class="app-user-name" id="appUserName"></span>
        <button class="logout-btn" onclick="doLogout()">Abmelden</button>
      </div>
    </div>
  </div>

  <!-- Sektion: Mitgliederliste -->
  <div class="section active" id="sectionMembers">
    <div class="section-header">
      <span class="app-count" id="countBadge">-</span>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Name, E-Mail oder Telefon suchen..." autocomplete="off">
    </div>
    <div class="list-container" id="listContainer">
      <div class="loading" id="loadingMsg">
        <div class="spinner"></div>
        Mitglieder werden geladen...
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxXkHbHkiWKDfk4alZR4iK8tb-Nqj1DysP2fE-q53Sf4Okt4fP0DOs17_nPPhqLdquS9w/exec';

let allMembers = [];
let currentUser = null;
let currentUsername = '';

// ── Login-Flow ──

function showStep(stepId) {
  document.querySelectorAll('.login-step').forEach(s => s.classList.remove('active'));
  document.getElementById(stepId).classList.add('active');
  // Fehler zurücksetzen
  document.querySelectorAll('.login-err').forEach(e => { e.style.display = 'none'; e.textContent = ''; });
  document.querySelectorAll('.login-box input').forEach(i => i.classList.remove('error'));
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}

function backToUsername() {
  showStep('stepUsername');
  document.getElementById('usernameInput').focus();
}

function checkUsername() {
  const username = document.getElementById('usernameInput').value.trim();
  if (!username) return;
  const btn = document.querySelector('#stepUsername button');
  btn.disabled = true;

  fetch(API_URL + '?action=checkUser&username=' + encodeURIComponent(username))
    .then(r => r.json())
    .then(data => {
      btn.disabled = false;
      if (data.error) { showError('usernameErr', data.error); return; }
      if (!data.exists) {
        showError('usernameErr', 'Benutzername nicht gefunden');
        document.getElementById('usernameInput').classList.add('error');
        return;
      }
      currentUsername = username;
      if (data.needsPassword) {
        document.getElementById('welcomeMsg').textContent = 'Willkommen, ' + data.displayName + '! Bitte lege dein Passwort fest.';
        showStep('stepSetPassword');
        document.getElementById('newPw1').focus();
      } else {
        document.getElementById('loginGreeting').textContent = 'Hallo, ' + data.displayName;
        showStep('stepLogin');
        document.getElementById('loginPw').focus();
      }
    })
    .catch(() => {
      btn.disabled = false;
      showError('usernameErr', 'Verbindungsfehler');
    });
}

function setPassword() {
  const pw1 = document.getElementById('newPw1').value;
  const pw2 = document.getElementById('newPw2').value;
  if (!pw1) return;
  if (pw1.length < 6) {
    showError('setPwErr', 'Passwort muss mindestens 6 Zeichen lang sein');
    document.getElementById('newPw1').classList.add('error');
    return;
  }
  if (pw1 !== pw2) {
    showError('setPwErr', 'Passwörter stimmen nicht überein');
    document.getElementById('newPw2').classList.add('error');
    return;
  }
  const btn = document.querySelector('#stepSetPassword button:first-of-type');
  btn.disabled = true;

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'setPassword', username: currentUsername, password: pw1 })
  })
    .then(r => r.json())
    .then(data => {
      btn.disabled = false;
      if (data.error) { showError('setPwErr', data.error); return; }
      loginSuccess(data);
    })
    .catch(() => {
      btn.disabled = false;
      showError('setPwErr', 'Verbindungsfehler');
    });
}

function doLogin() {
  const pw = document.getElementById('loginPw').value;
  if (!pw) return;
  const btn = document.querySelector('#stepLogin button:first-of-type');
  btn.disabled = true;

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'login', username: currentUsername, password: pw })
  })
    .then(r => r.json())
    .then(data => {
      btn.disabled = false;
      if (data.error) {
        showError('loginErr', data.error);
        document.getElementById('loginPw').classList.add('error');
        return;
      }
      loginSuccess(data);
    })
    .catch(() => {
      btn.disabled = false;
      showError('loginErr', 'Verbindungsfehler');
    });
}

function loginSuccess(data) {
  localStorage.setItem('zz_token', data.token);
  localStorage.setItem('zz_displayName', data.displayName);
  localStorage.setItem('zz_rolle', data.rolle);
  currentUser = { displayName: data.displayName, rolle: data.rolle };
  loadMembers(data.token);
}

// ── Daten laden ──

function loadMembers(token) {
  document.getElementById('loadingMsg').style.display = 'block';
  fetch(API_URL + '?action=members&token=' + encodeURIComponent(token))
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        // Token ungültig → zurück zum Login
        localStorage.removeItem('zz_token');
        localStorage.removeItem('zz_displayName');
        localStorage.removeItem('zz_rolle');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        return;
      }
      if (data.user) currentUser = data.user;
      allMembers = (data.members || []).reverse();
      showApp();
    })
    .catch(() => {
      document.getElementById('loadingMsg').innerHTML = '<div style="color:var(--error)">Verbindungsfehler. Bitte Seite neu laden.</div>';
    });
}

// ── App anzeigen ──

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('appUserName').textContent = currentUser ? currentUser.displayName : '';
  document.getElementById('countBadge').textContent = allMembers.length + ' Mitglieder';
  document.getElementById('searchInput').focus();
  renderList(allMembers);
}

function doLogout() {
  localStorage.removeItem('zz_token');
  localStorage.removeItem('zz_displayName');
  localStorage.removeItem('zz_rolle');
  currentUser = null;
  currentUsername = '';
  allMembers = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  showStep('stepUsername');
  document.getElementById('usernameInput').value = '';
  document.getElementById('usernameInput').focus();
}

// Kein Auto-Login — Benutzer muss sich immer anmelden

// ── Enter-Keys ──
document.getElementById('usernameInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkUsername(); });
document.getElementById('newPw2').addEventListener('keydown', e => { if (e.key === 'Enter') setPassword(); });
document.getElementById('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ── Tab-Navigation ──
document.querySelectorAll('.app-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.app-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    var sectionId = 'section' + tab.dataset.section.charAt(0).toUpperCase() + tab.dataset.section.slice(1);
    document.getElementById(sectionId).classList.add('active');
  });
});

// ── Suche ──
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { renderList(allMembers); return; }
    const terms = q.split(/\s+/);
    const filtered = allMembers.filter(m => {
      const h = (m.nachname+' '+m.vorname+' '+m.email+' '+m.telefon+' '+m.ort+' '+m.chipnr).toLowerCase();
      return terms.every(t => h.includes(t));
    });
    renderList(filtered, q);
  }, 150);
});

// ── Mitgliederliste rendern ──

function renderList(members, query) {
  const container = document.getElementById('listContainer');
  if (members.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="nr-icon">&#128269;</div>' + (query ? 'Kein Mitglied gefunden f\u00fcr \u201e'+escHtml(query)+'\u201c' : 'Keine Mitglieder vorhanden') + '</div>';
    updateCount(members.length); return;
  }
  let html = '';
  members.forEach(m => {
    const initials = (m.vorname.charAt(0)+m.nachname.charAt(0)).toUpperCase();
    const name = escHtml(m.vorname)+' '+escHtml(m.nachname);
    const displayName = query ? highlightMatch(name, query) : name;
    html += '<div class="member-card"><div class="member-avatar">'+initials+'</div><div class="member-info"><div class="member-name">'+displayName+'</div><div class="member-meta">';
    if (m.telefon) html += '<span><a href="tel:'+escAttr(m.telefon)+'">'+escHtml(m.telefon)+'</a></span>';
    if (m.email) html += '<span><a href="mailto:'+escAttr(m.email)+'">'+escHtml(m.email)+'</a></span>';
    if (m.ort) html += '<span>'+escHtml(m.ort)+'</span>';
    html += '</div></div><div class="member-badges">';
    if (m.status) html += '<span class="member-status">'+escHtml(m.status)+'</span>';
    const chipClass = m.chip==='Ja'?'has-chip':'no-chip';
    const chipLabel = m.chip==='Ja'?'Chip: '+escHtml(m.chipnr||'-'):'Kein Chip';
    const idx = allMembers.indexOf(m);
    const isAdmin = currentUser && currentUser.rolle === 'admin';
    if (isAdmin) {
      html += '<span class="chip-badge '+chipClass+'" onclick="editChip('+idx+')" title="Klicken zum Bearbeiten">'+chipLabel+'</span>';
      html += '<div class="chip-edit" id="chipEdit'+idx+'" style="display:none">'
        + '<select id="chipSel'+idx+'"><option value="Ja" '+(m.chip==='Ja'?'selected':'')+'>Ja</option><option value="Nein" '+(m.chip!=='Ja'?'selected':'')+'>Nein</option></select>'
        + '<input id="chipNr'+idx+'" value="'+escAttr(m.chipnr||'')+'" placeholder="ChipNr.">'
        + '<button class="save-btn" onclick="saveChip('+idx+')">OK</button>'
        + '<button class="cancel-btn" onclick="cancelChip('+idx+')">&#10005;</button>'
        + '</div>';
    } else {
      html += '<span class="chip-badge '+chipClass+'">'+chipLabel+'</span>';
    }
    html += '</div></div>';
  });
  container.innerHTML = html;
  updateCount(members.length);
}

function updateCount(n) {
  const t = allMembers.length;
  document.getElementById('countBadge').textContent = n===t?t+' Mitglieder':n+' / '+t;
}

function highlightMatch(text, query) {
  const terms = query.split(/\s+/);
  let result = text;
  terms.forEach(term => {
    if (!term) return;
    const re = new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    result = result.replace(re,'<span class="highlight">$1</span>');
  });
  return result;
}

function escHtml(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function escAttr(s) { return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function editChip(idx) { document.getElementById('chipEdit'+idx).style.display='flex'; }
function cancelChip(idx) { document.getElementById('chipEdit'+idx).style.display='none'; }

function saveChip(idx) {
  const m=allMembers[idx];
  const chip=document.getElementById('chipSel'+idx).value;
  const chipnr=document.getElementById('chipNr'+idx).value.trim();
  const token=localStorage.getItem('zz_token');
  m.chip=chip; m.chipnr=chipnr;
  fetch(API_URL+'?token='+encodeURIComponent(token)+'&action=updateChip&nachname='+encodeURIComponent(m.nachname)+'&vorname='+encodeURIComponent(m.vorname)+'&chip='+encodeURIComponent(chip)+'&chipnr='+encodeURIComponent(chipnr))
    .then(r=>r.json()).then(d=>{if(d.error)alert('Fehler: '+d.error);}).catch(err=>alert('Speichern fehlgeschlagen: '+err));
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(q){const terms=q.split(/\s+/);const filtered=allMembers.filter(m2=>{const h=(m2.nachname+' '+m2.vorname+' '+m2.email+' '+m2.telefon+' '+m2.ort+' '+m2.chipnr).toLowerCase();return terms.every(t=>h.includes(t));});renderList(filtered,q);}
  else renderList(allMembers);
}
</script>
